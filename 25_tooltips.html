<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title> Tooltips | Bootstrap 4</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<h1 class="display-4 text-center my-4">Tooltips</h1>

<div class="container">

    <!-- Tooltips -->
    <button class="btn btn-primary " data-placement="top" data-toggle="tooltip" title="Hello Piyash!">Tooltips on top</button>

    <button class="btn btn-info " data-placement="left" data-toggle="tooltip"  title="Hello Piyash!">Tooltips on left</button>

    <button class="btn btn-secondary " data-placement="right" data-toggle="tooltip"  title="Hello Piyash!">Tooltips on right</button>

    <button class="btn btn-warning " data-placement="bottom" data-toggle="tooltip"  title="Hello Piyash!">Tooltips on bottom</button>

    <br><br>
    <!-- Tooltips with html -->
    <button id="hello" class="btn btn-success" data-html="true" data-placement="top" data-toggle="tooltip" title="<h2>Hello Dhaka!</h2><p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Proin facilisis eget velit at tincidunt.</p>">Tooltips on top</button>

    <br>
    <hr>
    <!-- Trigger with js -->
    <button class="btn btn-secondary" onclick="showToolTip()">show tooltip</button>
    <button class="btn btn-warning" onclick="hideToolTip()">Hide tooltip</button>
    <button class="btn btn-danger" onclick="toggleToolTip()">Toggle tooltip</button>
    <!--  -->

</div>

<script src="js/jquery-slim.min.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/bootstrap.min.js"></script>

<script>
    $('[data-toggle="tooltip"]').tooltip();
    function showToolTip() {
        $('#hello').tooltip('show');
    }

    function hideToolTip() {
        $('#hello').tooltip('hide');
    }

    function toggleToolTip() {
        $('#hello').tooltip('toggle');
    }
</script>
</body>
</html>
